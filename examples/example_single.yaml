# example_single.yaml
# Single-point simulation config.
# Geometry matches stepgen_seed/example_run.py exactly.

fluids:
  mu_continuous: 0.00089      # Pa·s  water (continuous phase)
  mu_dispersed:  0.03452      # Pa·s  oil  (dispersed phase — forms droplets)
  emulsion_ratio: 0.3
  gamma: 0.0
  temperature_C: 25.0

geometry:
  main:
    Mcd: 100.0e-6    # 100 µm depth
    Mcw: 500.0e-6    # 500 µm width
    Mcl: 2040.0e-3   # 2040 mm routed length  →  Nmc = floor(2.04 / 3e-6) = 680000

  rung:
    mcd: 0.3e-6      # 0.3 µm depth
    mcw: 1.0e-6      # 1 µm width
    mcl: 200.0e-6    # 200 µm length
    pitch: 3.0e-6    # 3 µm pitch
    constriction_ratio: 1.0

  junction:
    exit_width: 1.0e-6
    exit_depth: 0.3e-6
    junction_type: step

operating:
  mode: A
  Po_in_mbar: 200.0
  Qw_in_mlhr: 5.0
  P_out_mbar: 0.0

footprint:
  footprint_area_cm2: 10.0
  footprint_aspect_ratio: 1.5
  lane_spacing: 500.0e-6
  turn_radius: 500.0e-6
  reserve_border: 2.0e-3

manufacturing:
  max_main_depth: 200.0e-6
  min_feature_width: 0.5e-6
  max_main_width: 1000.0e-6

droplet_model:
  k: 3.3935   # calibrated: D = k * exit_width^a * exit_depth^b  (SI)
  a: 0.3390   # power on exit_width
  b: 0.7198   # power on exit_depth  (depth dominates)
  dP_cap_ow_mbar: 50.0
  dP_cap_wo_mbar: 30.0
