# Test configuration for stage-wise v3 model
# Based on example_stage_wise.yaml with added v3 section

fluids:
  mu_continuous: 0.00089      # Pa·s  water (continuous phase)
  mu_dispersed:  0.06         # Pa·s  oil  (dispersed phase — forms droplets)
  emulsion_ratio: 0.1
  gamma: 0.015                # Set surface tension to 15 mN/m
  temperature_C: 20.0

geometry:
  main:
    Mcd: 200.0e-6
    Mcw: 2000.0e-6
    Mcl: 0.75

  rung:
    mcd: 5e-6
    mcw: 8e-6
    mcl: 4000.0e-6
    pitch: 30e-6
    constriction_ratio: 0.9

  junction:
    exit_width: 15e-6
    exit_depth: 5e-6
    junction_type: step

operating:
  mode: A
  Po_in_mbar: 300.0
  Qw_in_mlhr: 1.5
  P_out_mbar: 0.0

footprint:
  footprint_area_cm2: 100
  footprint_aspect_ratio: 1.5
  lane_spacing: 500.0e-6
  turn_radius: 500.0e-6
  reserve_border: 2.0e-3

manufacturing:
  max_main_depth: 200.0e-6
  min_feature_width: 0.5e-6
  max_main_width: 2000.0e-6

operating_map:
  Po_min_mbar: 50.0
  Po_max_mbar: 500.0
  Po_n: 10
  Qw_min_mlhr: 2.0
  Qw_max_mlhr: 15.0
  Qw_n: 6

droplet_model:
  k: 3.3935   # calibrated: D = k * exit_width^a * exit_depth^b  (SI)
  a: 0.3390   # power on exit_width
  b: 0.7198   # power on exit_depth  (depth dominates)
  dP_cap_ow_mbar: 35.0
  dP_cap_wo_mbar: 30.0

# v3 STAGE-WISE MODEL CONFIGURATION
stage_wise_v3:
  enabled: true

  # Model selection
  stage1_mechanism: "auto"                 # auto, hydraulic, interface, adsorption, backflow

  # Physics switches (aligned with resolved physics issues)
  enable_two_fluid_washburn: true          # Issue 3A: Two-fluid Washburn baseline
  enable_outer_phase_necking: true         # Strategic: Literature-corrected necking
  enable_multi_factor_regime: true         # Strategic: Multi-factor classification
  enable_design_feedback: false            # Strategic: Design optimization (deferred)

  # Key physics parameters (back-calculated from experiment)
  gamma_effective: 15.0e-3                 # N/m - effective interfacial tension
  theta_effective: 30.0                    # degrees - effective contact angle
  R_critical_ratio: 0.7                    # R_crit / min(w,h) - geometry-dependent

  # Hydraulic network parameters (Issue 1: Dynamic reduced-order system)
  enable_dynamic_hydraulics: true          # Enable droplet loading feedback
  hydraulic_convergence_tolerance: 0.01    # Convergence tolerance for iteration
  max_hydraulic_iterations: 10             # Maximum hydraulic-droplet iterations

  # Grouped rung simulation (Issue 10: Grouped rung architecture)
  pressure_uniformity_threshold: 0.05      # 5% P_j variation triggers grouping
  max_groups: 10                           # Maximum number of rung groups

  # Advanced physics (hidden from typical users)
  _mechanism_thresholds:
    ca_interface_threshold: 0.1             # Interface-dominated threshold
    pe_adsorption_threshold: 1.0            # Adsorption-dominated threshold
    pressure_backflow_threshold: 2.0        # Backflow-dominated threshold
    ca_neck_critical: 0.3                   # Neck capillary number warning

  # Validation parameters
  enable_physics_validation: true          # Enable physics validation checks
  enable_transition_warnings: true         # Enable regime transition warnings