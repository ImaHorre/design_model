# example_sweep.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Base config for a multi-candidate geometry sweep.
# This file defines one candidate; you generate variants in Python by replacing
# fields (e.g. rung depth, pitch) across a list of configs.
#
# CLI usage (single candidate):
#   stepgen sweep examples/example_sweep.yaml --Po 200 --Qw 5 --out sweep.csv
#
# Programmatic usage (vary rung depth):
#   from stepgen.config import load_config
#   from stepgen.design.sweep import sweep
#   import dataclasses
#
#   base = load_config("examples/example_sweep.yaml")
#   candidates = []
#   for mcd_um in [3, 5, 8, 10]:
#       rung = dataclasses.replace(base.geometry.rung, mcd=mcd_um * 1e-6)
#       geom = dataclasses.replace(base.geometry, rung=rung)
#       candidates.append(dataclasses.replace(base, geometry=geom))
#
#   df = sweep(candidates)
#   df.to_csv("sweep_results.csv", index=False)
#
# WHAT YOU GET:
#   One row per candidate in the output CSV:
#   Nmc, Q_oil, Q_water, Q_spread_pct, dP_spread_pct,
#   active_fraction, D_pred, f_pred_mean, passes_hard_constraints, ...
#
# REQUIRED vs OPTIONAL:
#   fluids, geometry (main+rung+junction), operating, droplet_model  — REQUIRED
#   footprint    — OPTIONAL (only used by 'report'; ignored by 'sweep')
#   manufacturing — OPTIONAL (only affects passes_hard_constraints flag)
#   Nmc_override  — OPTIONAL (set under geometry: if rung count is known directly)
# ─────────────────────────────────────────────────────────────────────────────


# ── REQUIRED ──────────────────────────────────────────────────────────────────
fluids:
  mu_continuous: 0.00089      # Pa·s  water (continuous / carrier phase)
  mu_dispersed:  0.03452      # Pa·s  oil   (dispersed / droplet phase)
  emulsion_ratio: 0.3
  gamma: 0.0
  temperature_C: 25.0


geometry:
  # ── Nmc override ─────────────────────────────────────────────────────────
  # Nmc is derived here as floor(30e-3 / 3e-6) = 10 000 — correct for this config.
  # To fix Nmc at a known value (e.g. if your device has exactly 200 rungs):
  #   Nmc_override: 200
  # Mcl and pitch must still be specified — they set the main channel and
  # per-segment resistances respectively.

  main:
    Mcd: 100.0e-6    # 100 µm depth
    Mcw: 500.0e-6    # 500 µm width
    Mcl: 30.0e-3     # 30 mm routed length → Nmc = 10 000 at 3 µm pitch

  rung:
    mcd: 0.3e-6      # 0.3 µm depth  — vary this across candidates
    mcw: 1.0e-6      # 1 µm width
    mcl: 200.0e-6    # 200 µm length
    pitch: 3.0e-6    # 3 µm pitch
    constriction_ratio: 1.0

  junction:
    exit_width: 1.0e-6
    exit_depth: 0.3e-6
    junction_type: step


# ── REQUIRED ──────────────────────────────────────────────────────────────────
# Default operating point; can be overridden per-sweep via --Po / --Qw on CLI.
operating:
  mode: A
  Po_in_mbar: 200.0
  Qw_in_mlhr: 5.0
  P_out_mbar: 0.0


# ── REQUIRED ──────────────────────────────────────────────────────────────────
droplet_model:
  k: 3.3935
  a: 0.3390
  b: 0.7198
  dP_cap_ow_mbar: 50.0
  dP_cap_wo_mbar: 30.0


# ── OPTIONAL — not used by 'sweep'; only needed for 'report' ──────────────────
footprint:
  footprint_area_cm2: 10.0
  footprint_aspect_ratio: 1.5
  lane_spacing: 500.0e-6
  turn_radius: 500.0e-6
  reserve_border: 2.0e-3


# ── OPTIONAL — only affects passes_hard_constraints flag in sweep output ───────
manufacturing:
  max_main_depth: 200.0e-6
  min_feature_width: 0.5e-6
  max_main_width: 1000.0e-6
