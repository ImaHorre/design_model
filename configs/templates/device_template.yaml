# device_template.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Template for configuring a specific physical device.
# Copy this file, fill in your geometry, and run any of:
#
#   stepgen simulate  my_device.yaml [--Po 200] [--Qw 5] [--out result.json]
#   stepgen report    my_device.yaml [--Po 200] [--Qw 5] [--out-dir plots/]
#   stepgen map       my_device.yaml [--Po-min 50 --Po-max 400 ...]
#   stepgen compare   my_device.yaml experiments.csv [--calibrate]
#
# REQUIRED vs OPTIONAL — quick reference
# ─────────────────────────────────────────────────────────────────────────────
#   fluids            REQUIRED — viscosities drive all resistance calculations
#   geometry.main     REQUIRED — Mcd, Mcw, Mcl (even if using Nmc_override)
#   geometry.rung     REQUIRED — mcd, mcw, mcl, pitch, constriction_ratio
#   geometry.junction REQUIRED — exit_width, exit_depth drive droplet size (D_pred)
#   operating         REQUIRED — Po_in_mbar, Qw_in_mlhr at minimum
#   droplet_model     REQUIRED — k, a, b, dP_cap_ow_mbar, dP_cap_wo_mbar
#
#   geometry.Nmc_override  OPTIONAL — if you know the rung count directly;
#                                     overrides floor(Mcl / pitch)
#   footprint         OPTIONAL — only used by 'stepgen report' for layout_schematic.png
#                                and by the design search engine; safe to leave as defaults
#   manufacturing     OPTIONAL — only affects the 'hard OK' flag in output;
#                                simulation runs regardless; safe to leave as defaults
# ─────────────────────────────────────────────────────────────────────────────
#
# All dimensions in SI (metres). Use scientific notation: 100e-6 = 100 µm.
# ─────────────────────────────────────────────────────────────────────────────


# ── REQUIRED ──────────────────────────────────────────────────────────────────
fluids:
  mu_continuous: 0.00089      # Pa·s  water (continuous / carrier phase)
  mu_dispersed:  0.03452      # Pa·s  oil   (dispersed / droplet phase)
  emulsion_ratio: 0.3         # Q_oil / Q_water (used in Mode B; informational in Mode A)
  gamma: 0.0                  # N/m   interfacial tension (not used in solver yet)
  temperature_C: 25.0         # °C    informational only


geometry:
  # ── Nmc override (optional) ──────────────────────────────────────────────
  # If you know the exact number of rungs in your device, set this and it
  # will override the floor(Mcl / pitch) calculation.
  # Leave commented out to derive Nmc automatically from Mcl and pitch.
  # Mcl and pitch are still required even when Nmc_override is set —
  # Mcl sets main-channel resistance; pitch sets per-segment resistance.
  #
  # Nmc_override: 500

  main:
    Mcd: 100.0e-6    # main channel depth  [m]  — e.g. 100 µm
    Mcw: 500.0e-6    # main channel width  [m]  — e.g. 500 µm
    Mcl: 20.0e-3     # main channel routed length [m]  — e.g. 20 mm
                     # Note: Nmc = floor(Mcl / pitch) unless Nmc_override is set

  rung:
    mcd: 5.0e-6      # rung depth          [m]  — e.g. 5 µm
    mcw: 5.0e-6      # rung width          [m]  — e.g. 5 µm
    mcl: 200.0e-6    # rung length         [m]  — e.g. 200 µm
    pitch: 40.0e-6   # centre-to-centre rung spacing [m]  — e.g. 40 µm
    constriction_ratio: 1.0   # fraction of rung length that is the narrow section

  junction:
    # These two values set the predicted droplet diameter via D = k·w^a·h^b.
    # Typically the exit cross-section of the step junction.
    exit_width: 5.0e-6    # junction exit width [m]
    exit_depth: 5.0e-6    # junction exit depth [m]
    junction_type: step


# ── REQUIRED ──────────────────────────────────────────────────────────────────
operating:
  mode: A                # A = pressure-controlled oil inlet (most common)
                         # B = flow-controlled oil inlet — also set Qo_in_mlhr below
  Po_in_mbar: 200.0      # oil inlet pressure  [mbar]  (Mode A — ignored in Mode B)
  Qw_in_mlhr: 10.0       # water inlet flow    [mL/hr]
  P_out_mbar: 0.0        # outlet reference pressure [mbar] — usually 0 (gauge)
  # Qo_in_mlhr: 1.0      # oil inlet flow [mL/hr] — uncomment for Mode B
                         # Mode B derives the required Po; use --Qo on CLI instead


# ── REQUIRED ──────────────────────────────────────────────────────────────────
droplet_model:
  # D = k * exit_width^a * exit_depth^b  (SI units throughout)
  # These are the calibrated values. Adjust k with --calibrate or after fitting
  # to your own measurements.
  k: 3.3935
  a: 0.3390
  b: 0.7198
  dP_cap_ow_mbar: 50.0   # capillary threshold: oil breaks into water above this [mbar]
  dP_cap_wo_mbar: 30.0   # capillary threshold: water enters oil rail below this  [mbar]


# ── OPTIONAL — only used by 'stepgen report' (layout_schematic.png) ───────────
footprint:
  footprint_area_cm2: 10.0          # total chip area [cm²]
  footprint_aspect_ratio: 1.5       # width / height of chip
  lane_spacing: 500.0e-6            # lateral gap between oil and water channels [m]
  turn_radius: 500.0e-6             # buffer radius at serpentine turns [m]
  reserve_border: 2.0e-3            # chip border / keep-out zone [m]


# ── OPTIONAL — default grid for 'stepgen map' ─────────────────────────────────
# If present, 'stepgen map my_device.yaml' uses these ranges with no extra flags.
# CLI flags (--Po-min etc.) override individual fields when provided.
operating_map:
  Po_min_mbar: 50.0     # sweep start: oil pressure [mbar]
  Po_max_mbar: 500.0    # sweep end:   oil pressure [mbar]
  Po_n: 10              # number of Po steps
  Qw_min_mlhr: 2.0      # sweep start: water flow [mL/hr]
  Qw_max_mlhr: 15.0     # sweep end:   water flow [mL/hr]
  Qw_n: 6               # number of Qw steps


# ── OPTIONAL — only affects 'hard OK' flag in output, not simulation ──────────
manufacturing:
  max_main_depth: 200.0e-6          # maximum etchable main channel depth [m]
  min_feature_width: 0.5e-6         # minimum lithographic feature [m]
  max_main_width: 1000.0e-6         # maximum main channel width [m]
